name: Validate backup and recovery scripts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Bash syntax
        run: bash -n restore-n8n.sh n8n-daily-backup

      - name: Run ShellCheck
        run: shellcheck restore-n8n.sh n8n-daily-backup
